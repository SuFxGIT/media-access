<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upcoming Releases - Calendar</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/x-icon" href="icon2.png">
</head>

<body>
<!-- Header with navigation -->
<header>
  <div class="container">
    <nav>
      <a href="https://media.sufxconnect.cc/" class="logo">
        <img src="icon2.png" alt="" class="logo-icon">
        SUFX'S SERVER
      </a>
      <div class="nav-links">
        <a href="index.html" class="calendar-nav">
          <i class="fas fa-home"></i> Home
        </a>
        <a href="https://request.sufxconnect.cc/" target="_blank" class="requests-nav">
          <i class="fas fa-paper-plane"></i> Requests
        </a>
        <a href="status.html" class="status-nav">
          <i class="fas fa-heartbeat"></i> Server Status
        </a>
        <a href="index.html#vip-access" class="subscribe-nav">Subscribe</a>
      </div>
      
      <!-- Mobile Menu Button -->
      <div class="mobile-menu-btn">
        <i class="fas fa-bars"></i>
      </div>
    </nav>
    
    <!-- Mobile Menu -->
    <div class="mobile-menu">
      <button class="mobile-menu-close">
        <i class="fas fa-times"></i>
      </button>
      <a href="index.html" class="calendar-nav">
        <i class="fas fa-home"></i> Home
      </a>
      <a href="https://request.sufxconnect.cc/" target="_blank" class="requests-nav">
        <i class="fas fa-paper-plane"></i> Requests
      </a>
      <a href="status.html" class="status-nav">
        <i class="fas fa-heartbeat"></i> Server Status
      </a>
      <a href="index.html#vip-access" class="subscribe-nav">Subscribe</a>
    </div>
  </div>
  
  <!-- Add this backdrop element -->
  <div class="mobile-backdrop"></div>
</header>

<!-- Calendar Section -->
<section class="section" style="padding-top: 100px;">
  <div class="container">
    <h2 class="section-title">Release Calendar</h2>
    <div id="calendarContainer" class="calendar-container">
      <p style="text-align: center; color: var(--gray);"><i class="fas fa-spinner fa-spin"></i> Loading calendar...</p>
    </div>
  </div>
</section>

<!-- Tiny Server Stats Bar -->
<div class="calendar-stats-bar">
  <div class="calendar-stat-item">
    <i class="fas fa-film"></i>
    <span id="movieCount">—</span>
  </div>
  <div class="calendar-stat-item">
    <i class="fas fa-tv"></i>
    <span id="showCount">—</span>
  </div>
  <div class="calendar-stat-item">
    <i class="fas fa-torii-gate"></i>
    <span id="animeCount">—</span>
  </div>
</div>

<!-- Footer -->
<footer>
  <p>&copy; 2024 Server Access. All rights reserved.</p>
</footer>

<script src="calendar.js"></script>
<script src="script.js"></script>
</body>
</html>
